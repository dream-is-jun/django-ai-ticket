{% extends "base.html" %}


{% block title %}
    删除工单｜AI 智能工单系统
{% endblock %}


{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="page-card">
            <h2 class="text-danger mb-4">
                确认删除工单
            </h2>

            <div class="alert alert-warning">
                删除后无法恢复，请确认这张工单确实不再需要。
            </div>

            <dl class="row">
                <dt class="col-sm-3">
                    工单编号
                </dt>

                <dd class="col-sm-9">
                    #{{ ticket.pk }}
                </dd>

                <dt class="col-sm-3">
                    工单标题
                </dt>

                <dd class="col-sm-9">
                    {{ ticket.title }}
                </dd>

                <dt class="col-sm-3">
                    当前状态
                </dt>

                <dd class="col-sm-9">
                    {{ ticket.get_status_display }}
                </dd>
            </dl>

            <form method="post">
                {% csrf_token %}

                <button
                    type="submit"
                    class="btn btn-danger"
                >
                    确认删除
                </button>

                <a
                    href="{% url 'tickets:ticket_detail' ticket.pk %}"
                    class="btn btn-outline-secondary"
                >
                    取消
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
