{% extends "base.html" %}


{% block title %}
    用户登录｜AI 智能工单系统
{% endblock %}


{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="page-card">
            <h2 class="mb-4">
                用户登录
            </h2>

            {% if form.errors %}
                <div class="alert alert-danger">
                    用户名或密码不正确，请重新输入。
                </div>
            {% endif %}

            {% if next %}
                <div class="alert alert-warning">
                    请先登录，再访问目标页面。
                </div>
            {% endif %}

            <form
                method="post"
                action="{% url 'login' %}"
                class="auth-form"
            >
                {% csrf_token %}

                <div class="mb-3">
                    <label
                        for="{{ form.username.id_for_label }}"
                        class="form-label"
                    >
                        用户名
                    </label>

                    {{ form.username }}
                </div>

                <div class="mb-3">
                    <label
                        for="{{ form.password.id_for_label }}"
                        class="form-label"
                    >
                        密码
                    </label>

                    {{ form.password }}
                </div>

                <input
                    type="hidden"
                    name="next"
                    value="{{ next }}"
                >

                <button
                    type="submit"
                    class="btn btn-primary w-100"
                >
                    登录
                </button>
            </form>

            <p class="mt-3 mb-0">
                还没有账号？

                <a href="{% url 'tickets:register' %}">
                    立即注册
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
